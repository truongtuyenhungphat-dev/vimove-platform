[build]
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# index.html: KHÔNG BAO GIỜ cache — luôn lấy bản mới nhất
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    Pragma = "no-cache"

# JS files: phải validate lại với server mỗi lần load
[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate, max-age=0"

# CSS files: phải validate lại với server mỗi lần load
[[headers]]
  for = "/css/*.css"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate, max-age=0"
